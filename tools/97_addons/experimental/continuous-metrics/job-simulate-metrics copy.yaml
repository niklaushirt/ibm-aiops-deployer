apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-ui-admin
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: demo-ui-admin-crb
subjects:
  - kind: ServiceAccount
    name: demo-ui-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ibm-aiops-demo-ui
  name: ibm-aiops-simulate-metrics
  annotations: {}
spec:
  selector:
    matchLabels:
      app: ibm-aiops-logs-streaming
  replicas: 1
  template:
    metadata:
      labels:
        app: ibm-aiops-logs-streaming
    spec:
      serviceAccount: ibm-aiops-demo-ui-admin
      containers:
        - name: tools
          image: quay.io/niklaushirt/ibm-aiops-tools:5.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env: []
          resources:
            requests:
              memory: "64Mi"
              cpu: "150m"
            limits:
              memory: "2024Mi"
              cpu: "1200m"
          command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              #set -x

              echo "*****************************************************************************************************************************"
              echo " ✅ STARTING: METRICS STREAMING POD"
              echo "*****************************************************************************************************************************"
              echo ""
              echo "  ⏳ INSTALLATION START TIMESTAMP: $(date)"
              echo ""
              echo "------------------------------------------------------------------------------------------------------------------------------"
  

              # FORMAT:
              #   resource_name, metric_name, group_name, fixed base value, random value
              #
              #   Example for "fixed base value"=100 and 2random value"=10
              #   Gives metrics values between 100 and 110
              #   If you put "fixed base value"=ITERATIONS then it will use the counter (for PodRestarts for example)
              declare -a MY_RES_IDS=(
                "mysql-predictive,MemoryUsagePercent,MemoryUsage,45,20"
                "mysql-predictive,MemoryUsageMean,MemoryUsage,30000,1000"
                "mysql-predictive,MemoryUsageMax,MemoryUsage,35000,4000"
                "mysql-predictive,PodRestarts,PodRestarts,1,1"
                "mysql-predictive,TransactionsPerSecond,TransactionsPerSecond,169,40"
                "mysql-predictive,Latency,Latency,2,1"
                "ratings-predictive,MemoryUsagePercent,MemoryUsage,45,10"
                "ratings-predictive,MemoryUsageMean,MemoryUsage,30000,1000"
                "ratings-predictive,MemoryUsageMax,MemoryUsage,35000,10000"
                "ratings-predictive,PodRestarts,PodRestarts,1,1"
                "ratings-predictive,TransactionsPerSecond,TransactionsPerSecond,160,40"
                "ratings-predictive,Latency,Latency,2,1"
                "DCWest1-Rack045-DELL3762,CPU1Temperature,System,ITERATIONS,90"
                "dSwitch-1-vm-network-port-1,TransactionsPerSecond,TransactionsPerSecond,0,1"
                "dcwest1-switch023,TransactionsPerSecond,TransactionsPerSecond,60,30"
              )


              export INTERVAL_SECONDS=5


              #-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
              #-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
              #-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
              # DO NOT MODIFY BELOW
              #-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
              #-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

              export DATE_FORMAT="+%s"
              export DATE_FORMAT_READABLE="+%Y-%m-%d %H:%M:%S"



              echo "   "
              echo "   "
              echo "   "
              echo "   "
              echo "   ----------------------------------------------------------------------------------------------------------------------------------------"
              echo "     🚀  Inject Synthetic Metrics for Anomaly generation"
              echo "   ----------------------------------------------------------------------------------------------------------------------------------------"



              echo "   ----------------------------------------------------------------------------------------------------------------------------------------"
              echo "     🔐  Getting credentials"
              echo "   ----------------------------------------------------------------------------------------------------------------------------------------"
              export AIOPS_NAMESPACE=$(oc get po -A|grep aiops-orchestrator-controller |awk '{print$1}')

              oc project $AIOPS_NAMESPACE >/dev/null 2>/dev/null

              export ROUTE=$(oc get route | grep ibm-nginx-svc | awk '{print $2}')
              PASS=$(oc get secret admin-user-details -o jsonpath='{.data.initial_admin_password}' | base64 --decode)
              export TOKEN=$(curl -k -s -X POST https://$ROUTE/icp4d-api/v1/authorize -H 'Content-Type: application/json' -d "{\"username\": \"admin\",\"password\": \"$PASS\"}" | jq .token | sed 's/\"//g')



              #--------------------------------------------------------------------------------------------------------------------------------------------
              #  Launch Metrics Injection 
              #--------------------------------------------------------------------------------------------------------------------------------------------
              echo "      -------------------------------------------------------------------------------------------------------------------------------------"
              echo "       🌏  Injecting Metrics Data" 
              echo "           Quit with Ctrl-Z"
              echo "      -------------------------------------------------------------------------------------------------------------------------------------"
              echo ""

              # Loop until CTRL-C
              while true
              do
                    export BASE_TIMESTAMP=$(date "$DATE_FORMAT")"000"

                    export HR_BASE_TIMESTAMP=$(date "$DATE_FORMAT_READABLE")

                    echo "        Starting new iteration at "$HR_BASE_TIMESTAMP

                    echo '{"groups":['> /tmp/tmp_inject.json


                    for value in "${MY_RES_IDS[@]}"
                    do
                          #echo ":"$value| sed 's/^/             /'

                          MY_RESOURCE_ID=$(echo $value | cut -d',' -f1)
                          MY_METRIC_NAME=$(echo $value | cut -d',' -f2)
                          MY_GROUP_ID=$(echo $value | cut -d',' -f3)
                          MY_FIX_VALUE=$(echo $value | cut -d',' -f4)
                          MY_VARIATION=$(echo $value | cut -d',' -f5)

                          export CURRENT_VALUE=$(($RANDOM%$MY_VARIATION+$MY_FIX_VALUE))

                          # echo ":"$MY_METRIC_NAME"CURRENT_VALUE:"$CURRENT_VALUE
                          # echo ":"$MY_RESOURCE_ID
                          # echo ":"$MY_METRIC_NAME
                          # echo ":"$MY_GROUP_ID
                          # echo ":"$MY_FIX_VALUE
                          # echo ":"$MY_VARIATION
                          # echo "CURRENT_VALUE:"$CURRENT_VALUE
                          # echo "MY_TIMESTAMP:"$BASE_TIMESTAMP

                          echo "{\"timestamp\":\"$BASE_TIMESTAMP\",\"resourceID\":\"$MY_RESOURCE_ID\",\"metrics\":{\"$MY_METRIC_NAME\":$CURRENT_VALUE},\"attributes\":{\"group\":\"$MY_GROUP_ID\",\"node\":\"$MY_RESOURCE_ID\"}},">> /tmp/tmp_inject.json
                    done

                    echo "{\"timestamp\":\"$BASE_TIMESTAMP\",\"resourceID\":\"$MY_RESOURCE_ID\",\"metrics\":{\"$MY_METRIC_NAME\":$CURRENT_VALUE},\"attributes\":{\"group\":\"$MY_GROUP_ID\",\"node\":\"$MY_RESOURCE_ID\"}}">> /tmp/tmp_inject.json
                    echo ']}'>> /tmp/tmp_inject.json

                    # cat /tmp/tmp_inject.json
                    export result=$(curl -k -X POST "https://${ROUTE}/aiops/api/app/metric-api/v1/metrics" --header 'Content-Type: application/json' --header "Authorization: Bearer ${TOKEN}" --header 'X-TenantID: cfd95b7e-3bc7-4006-a4a8-a73a79c71255' --data @/tmp/tmp_inject.json)
                    echo $result

                    sleep $INTERVAL_SECONDS
              done



              echo ""
              echo ""
              echo "  ⏳ INSTALLATION END TIMESTAMP: $(date)"
              echo ""
              echo "*****************************************************************************************************************************"
              echo " ✅ INITIALIZATION - WAITING FOREVER"
              echo "*****************************************************************************************************************************"

           
              while true
              do
                sleep 1000
              done

      imagePullSecrets: []
  paused: false


