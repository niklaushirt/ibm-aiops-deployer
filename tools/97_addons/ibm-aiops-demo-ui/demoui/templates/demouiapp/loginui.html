<body>
    <div id=root>
        <div class="cds--g100 cds--layer-one">
            <div class=login>
                <div class=left>
                    
                

                    <div class=form>
                       <h1> <img src="{{INSTANCE_IMAGE}}"
                        style="width:60px;height:60px;" alt="{{PAGE_TITLE}}"> Log in to IBM AIOps Demo UI - {{INSTANCE_NAME}} </h1>
                        <BR>
                        <BR>
                        <BR>
                      
                            <form class=cds--form action="login" method="GET" id="loginform">
                            <div class="cds--form-item cds--text-input-wrapper">
                                <div class="cds--text-input__label-wrapper"><label for="create-ingestion-job-name"
                                        class="cds--label" dir="auto">Password</label></div>
                               
                          
                        
                                <div class="cds--text-input__field-wrapper">
                                    <input class="cds--text-input" id="exampleFormControlInput1" type="password"
                                        name="token" required="" placeholder="Type your Password" 
                                         autocomplete="username" required autofocus>
                        
                                    </div>
                            </div>
                            <div class=input-section>
                                <button class="login-button cds--btn cds--layout--size-lg cds--btn--primary" href=""
                                    onclick="document.getElementById('loginform').submit();" type=submit>Login<svg
                                        focusable=false preserveAspectRatio="xMidYMid meet" fill=currentColor
                                        aria-hidden=true width=16 height=16 viewBox="0 0 16 16" class=cds--btn__icon
                                        xmlns=http://www.w3.org/2000/svg> <path
                                        d="M9.3 3.7L13.1 7.5 1 7.5 1 8.5 13.1 8.5 9.3 12.3 10 13 15 8 10 3z"></path>
                                    </svg>
                                </button>
                            </div>
                        </form>
                        <div class=help>
                        </div>
                    </div>
                </div>
                <div class=right>
                    <div class=illustration
                        style="background-image: url(./static/images/concert.png);background-repeat: no-repeat; background-size: 100% 100%;">
                    </div>
                </div>
