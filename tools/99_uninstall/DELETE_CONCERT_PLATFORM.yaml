apiVersion: v1                     
kind: Namespace
metadata:
  name: ibm-installer
---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: ibm-installer-admin
  namespace: ibm-installer
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: ibm-installer-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ibm-installer-admin
    namespace: ibm-installer
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: ibm-installer-default-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: default
    namespace: ibm-installer
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: scc-ibm-installer-admin
allowPrivilegedContainer: true
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
users:
- developer
- system:serviceaccount:ibm-installer:ibm-installer-admin
groups:
- developer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibm-delete-concert-platform
  namespace: ibm-installer
  annotations: {}
spec:
  selector:
    matchLabels:
      app: ibm-installer
  replicas: 1
  template:
    metadata:
      labels:
        app: ibm-installer
    spec:
      containers:
        - name: tools
          image: quay.io/niklaushirt/ibm-aiops-tools:5.1.0

          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
            capabilities:
              add: 
              - ALL
          serviceAccount: ibm-installer-admin
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "150m"
            limits:
              memory: "2024Mi"
              cpu: "1200m"
          command:
            - /bin/sh
            - -c
            - |
              #!/bin/bash
              #set -x

              echo "*****************************************************************************************************************************"
              echo " ✅ STARTING: DELETE CONCERT PLATFORM"
              echo "*****************************************************************************************************************************"
              echo ""
              echo "  ⏳ INSTALLATION START TIMESTAMP: $(date)"
              echo ""
              echo "------------------------------------------------------------------------------------------------------------------------------"
      

              oc delete Xl -n turbonomic xl-release 
              sleep 15
              oc delete ns home-ui &


              oc delete ns ibm-concert &
              oc delete ns ibm-concert-dataapps &
              oc delete ns ibm-concert-hub &
              oc delete ns ibm-concert-workflows &
              oc delete ns concert-securecoder &
              oc delete ns faas &


              oc delete ns turbonomic &


              oc delete ns ibm-installer &
              oc delete ConsoleNotifications --all



              echo ""
              echo ""
              echo ""
              echo ""
              echo "  ⏳ INSTALLATION END TIMESTAMP: $(date)"
              echo ""
              echo "*****************************************************************************************************************************"
              echo " ✅ INITIALIZATION - WAITING FOREVER"
              echo "*****************************************************************************************************************************"


              while true
              do
                sleep 1000
              done
          env:
          - name: IBM_ENTITLEMENT_KEY
            value: <CHANGEME>
      imagePullSecrets: []
  paused: false


