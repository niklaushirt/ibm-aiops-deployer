# ---------------------------------------------------------------------------------------------------------------------------------------------------"
# INSTALL DEMO APPS
# ---------------------------------------------------------------------------------------------------------------------------------------------------"
# Create Demo Apps
- name: (001/002) - 🟡🟡🟡🟡🟡🟡🟡🟡🟡  Create the Demo Apps 
  include_tasks: 23_addons-demoapps.yaml
  when: current_feature.install_demoapps | default(false)


- name: (002/002) - 🟡🟡🟡🟡🟡🟡🟡🟡🟡  Create Home UI
  include_tasks: 27_ibm-home-ui.yaml
  when: current_feature.create_home_ui | default(false)


- name: 🟡🟡🟡 Install OCP Menu Item
  include_tasks: 91_addons-create-ocp-tools-menu.yaml
  when: global_config.create_ocp_items | default(true)  


- name: 🟡🟡🟡 End Logging
  include_tasks: "{{role_path}}/../ibm-install-global/tasks/91-log-end.yaml"


- name: 📣 OCP CONSOLE - Create Openshift NOTIFICATION
  shell: |
    oc delete ConsoleNotification ibm-aiops-notification-instana>/dev/null 2>/dev/null
    oc delete ConsoleNotification ibm-aiops-notification-password>/dev/null 2>/dev/null
    oc delete ConsoleNotification ibm-aiops-notification-status>/dev/null 2>/dev/null
    export appURL=$(oc get routes -n instana-core dev-aiops -o jsonpath="{['spec']['host']}")|| true
    cat <<EOF | oc apply -f -
    apiVersion: console.openshift.io/v1
    kind: ConsoleNotification
    metadata:
        name: ibm-aiops-notification-instana
    spec:
        backgroundColor: '#009a00'
        color: '#fff'
        link:
            href: "https://$appURL"
            text: Instana
        location: BannerTop
        text: "✅ IBM Instana is installed in this cluster. 🚀 Access it here:"
    EOF

  ignore_errors: true
  args:
    executable: /bin/bash




