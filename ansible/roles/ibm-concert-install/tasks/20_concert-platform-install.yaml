- name: 📣 OCP CONSOLE - Create Openshift NOTIFICATION
  shell: |
    cat <<EOF | oc apply -f -
    apiVersion: console.openshift.io/v1
    kind: ConsoleNotification
    metadata:
      name: ibm-aiops-notification-status
    spec:
      backgroundColor: '#ff7700'
      color: '#000'
      location: {{global_config.position_ocp_notifications | default("BannerTop")}}
      text: 'Finalizing {{current_feature.kind}}'    
    EOF
  ignore_errors: true
  args:
    executable: /bin/bash
  when: (global_config.create_ocp_notifications | default(true))|bool == true  




- name:   🚀 IBM Concert platform -  Finalize
  shell: |
    cd  /tmp/concert/ibm-concert
    echo ""
    echo ""
    echo ""
    echo ""
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " 🚀 Create Routes"
    echo "------------------------------------------------------------------------------------------------------------------------------"

    export HUB_NS={{ current_ibm_feature.project }}-hub
    /tmp/ibm-itom-assembly/ibm-platform-hub/bin/ocp-route.sh --namespace=$HUB_NS
    oc get routes solis-hub -n $HUB_NS


    echo ""
    echo ""
    echo ""
    echo ""
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " ✅ DONE"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    



  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1



