# --------------------------------------------------------------------------------------------------------------------------------------
# Install IBM Concert
# --------------------------------------------------------------------------------------------------------------------------------------

- name: 🛰️  START - INSTALL IBM Concert
  debug: 
    msg="{{ lookup('pipe','date +%d.%m.%Y---%H:%M:%S') }}"


- name: Log
  shell: |
    export MESSAGE="Installing IBM Concert"
    export currentDate=$(date +%Y-%m-%d_%H:%M)
    echo "---------------------------------------------------------------------------------------------------------------------------------------------------" >> ../install_{{current_feature.kind}}.log
    echo $currentDate" - "$MESSAGE  >> ../install_{{current_feature.kind}}.log
  ignore_errors: true





- name: 🚀 IBM Concert - Set IBM Concert Password 
  set_fact: current_admin_pass={{global_config.global_password}}


- name: 🟣  IBM Concert -  IBM Concert Password {{current_admin_pass}}
  debug:
    var: current_admin_pass
    verbosity: 1






# --------------------------------------------------------------------------------------------------------------------------------------
# Getting Installation source from GitHub
# --------------------------------------------------------------------------------------------------------------------------------------
- name: 📣 OCP CONSOLE - Create Openshift NOTIFICATION
  shell: |
    cat <<EOF | oc apply -f -
    apiVersion: console.openshift.io/v1
    kind: ConsoleNotification
    metadata:
      name: ibm-aiops-notification-status
    spec:
      backgroundColor: '#ffd500'
      color: '#000'
      location: {{global_config.position_ocp_notifications | default("BannerTop")}}
      text: 'Installing {{current_feature.kind}} - IBM Concert Getting Installation source from GitHub'    
    EOF
  ignore_errors: true
  args:
    executable: /bin/bash
  when: (global_config.create_ocp_notifications | default(true))|bool == true  





- name:   🚀 IBM Concert - Getting Installation source from GitHub
  shell: |
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " 🚀 Getting Installation source from GitHub"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    mkdir -p /tmp/
    cd  /tmp/

    wget https://github.com/IBM/Concert/releases/download/{{ current_feature.concert_version | default("v3.0.0") }}/ibm-concert-x86.tar.gz
    tar xfz ibm-concert-x86.tar.gz
    cd /tmp/ibm-concert
    # find . -type f -exec sed -i \
    # 's/rollout status Deployments,sts/rollout status Deployments/g' {} +

  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1






# --------------------------------------------------------------------------------------------------------------------------------------
# Prepare Installation
# --------------------------------------------------------------------------------------------------------------------------------------
- name: 📣 OCP CONSOLE - Create Openshift NOTIFICATION
  shell: |
    cat <<EOF | oc apply -f -
    apiVersion: console.openshift.io/v1
    kind: ConsoleNotification
    metadata:
      name: ibm-aiops-notification-status
    spec:
      backgroundColor: '#ffd500'
      color: '#000'
      location: {{global_config.position_ocp_notifications | default("BannerTop")}}
      text: 'Installing {{current_feature.kind}} - IBM Concert Prepare Installation'    
    EOF
  ignore_errors: true
  args:
    executable: /bin/bash
  when: (global_config.create_ocp_notifications | default(true))|bool == true  



- name:   🚀 IBM Concert - VARIABLES
  shell: |
    cd  /tmp/concert/ibm-concert
    echo ""
    echo ""
    echo ""
    echo ""
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " 🚀 Variables"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "USER                  : {{current_feature.concert_user | default("admin") }}"
    echo "PASSWORD:             : {{ global_config.global_password }}"
    echo "ENTITLED_REGISTRY_KEY : $ENTITLED_REGISTRY_KEY"
    echo ""
    echo ""
    echo ""
    echo ""
  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1



- name:   🚀 IBM Concert - Prepare Installation
  shell: |
  

    export INSTALL_DIR=/tmp/ibm-concert


    export OCP_URL=$(oc get Infrastructure cluster -o jsonpath={.status.apiServerURL})
    echo "OCP_URL: $OCP_URL"
    mv /tmp/ibm-concert/etc/params.ini /tmp/ibm-concert/etc/params.ini.all
    cat > /tmp/ibm-concert/etc/params.ini <<EOF
    
    #cat concert-dataapps-workflows-k8s-params.ini
    # INSTALL_EKS: Set as True if installing on EKS
    INSTALL_EKS={{ current_feature.install_eks | default(false) }}
    # This example is to install Hub, Concert, Data Apps and Workflows on a Kubernetes cluster.
    REG_USER={{ current_feature.prod_user }}
    
    IMAGE_REGISTRY_PREFIX={{ current_feature.prod_registry }}


    # ----- Hub Configuration -----

    # OPTIONAL: 
    # For connecting installed product(s) to an existing remote Hub,
    # set HUB_URL and HUB_ACCESS_KEY parameters (details and examples in all-params.ini file).
    # If these parameters are not provided, local Hub will be automatically installed
    # HUB_URL=
    # HUB_ACCESS_KEY=

    # namespace for Hub
    HUB_NS={{ current_ibm_feature.project }}-hub
    HUB_IMAGE_REGISTRY_SUFFIX=/platform-hub
    # OPTIONAL: Set to 'true' to install additional local Hub components needed for integration with products like Turbonomic or Instana.
    ENABLE_CROSS_PRODUCT_INTEGRATION=true
    SCALE_CONFIG_HUB=level_1
    # storage class for Hub
    STORAGE_CLASS_HUB={{ STORAGE_CLASS_FILE }}



    # ----- Concert Configuration -----

    INSTALL_CONCERT={{ current_feature.install_concert | default(true) }}
    # namespace for Concert
    CONCERT_NS={{ current_ibm_feature.project }}
    CONCERT_IMAGE_REGISTRY_SUFFIX=/concert
    SCALE_CONFIG_CONCERT=level_1
    # storage class for Concert
    STORAGE_CLASS_CONCERT={{ STORAGE_CLASS_FILE }}


    # ----- Concert Secure Coder Configuration -----

    # Set to true to enable Concert buddy deployment
    ENABLE_BUDDY={{ current_feature.enable_buddy  | default(false) }}
    # Storage class (required if ENABLE_BUDDY is set to true)- pass the storage class name for Concert
    FILE_STORAGE_CLASS_CONCERT={{ STORAGE_CLASS_FILE }}
    INSTALL_SECURECODER={{ current_feature.install_secure_coder | default(false) }}


    # ----- Data Apps Configuration -----

    INSTALL_DATAAPPS={{ current_feature.install_dataapps | default(true) }}
    # namespace for Data Apps
    DATAAPPS_NS={{ current_ibm_feature.project }}-dataapps
    DATAAPPS_IMAGE_REGISTRY_SUFFIX=/concert
    SCALE_CONFIG_DATAAPPS=level_1
    # storage class for Dataapps
    STORAGE_CLASS_DATAAPPS={{ STORAGE_CLASS_FILE }}



    # ----- Concert Workflow Configuration -----

    INSTALL_WORKFLOWS={{ current_feature.install_workflows | default(true) }}
    WORKFLOWS_NS={{ current_ibm_feature.project }}-workflows
    # Domain name on which the application will listen
    # Example: solis-gw-workflows.apps.test.cp.my-domain.com
    WORKFLOWS_INSTANCE_ADDRESS=$OCP_URL
    # Takes a looooooot of time so set to false for the time being
    WORKFLOWS_INSTALL_ALL_INTEGRATIONS=false



    EOF

    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " 🛠️ Your Config File"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    cat /tmp/ibm-concert/etc/params.ini
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "------------------------------------------------------------------------------------------------------------------------------"

  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1



- name: 📣 OCP CONSOLE - Create Openshift NOTIFICATION
  shell: |
    cat <<EOF | oc apply -f -
    apiVersion: console.openshift.io/v1
    kind: ConsoleNotification
    metadata:
      name: ibm-aiops-notification-status
    spec:
      backgroundColor: '#ff7700'
      color: '#000'
      location: {{global_config.position_ocp_notifications | default("BannerTop")}}
      text: 'Installing {{current_feature.kind}} - 🕦 Wait for IBM Concert to become ready (about 30-40 minutes) - Started at $(date +%H:%M) UTC'    
    EOF
  ignore_errors: true
  args:
    executable: /bin/bash
  when: (global_config.create_ocp_notifications | default(true))|bool == true  



- name:   🚀 IBM Concert -  Installation
  shell: |
    cd  /tmp/
    echo ""
    echo ""
    echo ""
    echo ""
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " 🚀 Start Concert Installation"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "/tmp/bin/setup --license_acceptance=y --username={{current_feature.concert_user | default("admin") }} --password={{ global_config.global_password }} --registry_password=$ENTITLED_REGISTRY_KEY"
    /tmp/ibm-concert/bin/setup --license_acceptance=y --username={{current_feature.concert_user | default("admin") }} --password={{ global_config.global_password }} --registry_password=$ENTITLED_REGISTRY_KEY



  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1



