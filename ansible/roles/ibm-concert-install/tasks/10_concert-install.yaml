- name:   🚀 IBM Concert - IBM Concert Integrate ITOM and TurboLite
  shell: |
    export TURBO_URL=$(oc get route -n turbonomic nginx -o jsonpath={.spec.host})

    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " ✅ Register Turbo with ITOM"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    export CONCERT_HUB_NAMESPACE={{ current_ibm_feature.project }}-hub
    export TURBOLITE_URL="https://$TURBO_URL"
    export TURBOLITE_USER="Administrator"
    export TURBOLITE_PASSWORD={{ global_config.global_password }}
    export APIKEY=$(kubectl -n "${CONCERT_HUB_NAMESPACE}" \
      get secret itom-secrets \
      -o jsonpath="{.data.BACKEND_APIKEY}" | base64 -d)
    
    echo "TURBO_URL:  $TURBO_URL"
    echo "CONCERT_HUB_NAMESPACE:  $CONCERT_HUB_NAMESPACE"
    echo "TURBOLITE_URL:  $TURBOLITE_URL"
    echo "TURBOLITE_USER:  $TURBOLITE_USER"
    echo "TURBOLITE_PASSWORD:  $TURBOLITE_PASSWORD"
    echo "APIKEY:  $APIKEY"

    kubectl -n "${CONCERT_HUB_NAMESPACE}" exec deployment/ibm-itom-data-model-backend -- \
    bash -c "curl -k -X POST https://localhost:7531/api/v1/registerGroupWithTurboLite \
      -H \"x-api-key: ${APIKEY}\" \
      -H 'Content-Type: application/json' \
      -d '{
        \"group_id\": \"0000-0000-0000-0000-default\",
        \"account_id\": \"0000-0000-0000-0000\",
        \"turbolite_endpoint\": \"${TURBOLITE_URL}\",
        \"turbolite_user\": \"${TURBOLITE_USER}\",
        \"turbolite_password\": \"${TURBOLITE_PASSWORD}\"
      }'"


    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " ✅ Register Turbo with Platform"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    # Concert Observe: instana
    # Concert Optimize: turbonomic
    # Concert Protect and Concert Resilience: concert
    # Workflows: workflows
    # Data Apps: dataapps


    kubectl exec -it $(kubectl get pods -n ibm-installer | grep "ibm-install-concert" | awk '{print $1}') -n ibm-installer -- ls -al /tmp/ibm-concert/concert-hub/bin/
    kubectl exec -it $(kubectl get pods -n ibm-installer | grep "ibm-install-concert" | awk '{print $1}') -n ibm-installer -- /tmp/ibm-concert/concert-hub/bin/manage-product.sh --action=add --deployment-type=k8s --product-id=turbonomic --instance-url=https://$TURBO_URL --namespace={{ current_ibm_feature.project }}-hub --restart-hub=true


    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " ✅ Keycloak Credentials"
    echo "------------------------------------------------------------------------------------------------------------------------------"

    export KC_USER=$(kubectl exec -it $(kubectl get pods -n ibm-concert-hub | grep "ibm-solis-embedded-keycloak" | awk '{print $1}') -n ibm-concert-hub -- env | grep 'KC_BOOTSTRAP_ADMIN_USERNAME='| cut -d= -f2)
    export KC_PWD=$(kubectl exec -it $(kubectl get pods -n ibm-concert-hub | grep "ibm-solis-embedded-keycloak" | awk '{print $1}') -n ibm-concert-hub -- env | grep 'KC_BOOTSTRAP_ADMIN_PASSWORD='| cut -d= -f2)
    export KC_ROUTE=$(oc get route solis-hub -o jsonpath={.spec.host} -n $CONCERT_HUB_NAMESPACE)

    echo "KC_USER:        $KC_USER"
    echo "KC_PWD:         $KC_PWD"
    echo "KC_ROUTE:       https://$KC_ROUTE/sys/internal/kc"

  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash
  when: (current_feature.integrate_itom_turboLite | default(true))|bool == true  

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1




- name:   🚀 IBM Concert - IBM Concert Configuring platform AI agents
  shell: |
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " ✅ Register platform AI agents"
    echo "------------------------------------------------------------------------------------------------------------------------------"


    # https://www.ibm.com/docs/en/concert-platform?topic=guide-configuring-platform-ai-agents
    export CONCERT_HUB_NAMESPACE="ibm-concert-hub"
    export HUB_ROUTE=$(oc get route kc -o jsonpath={.spec.host} -n $CONCERT_HUB_NAMESPACE)

    export AGENT_CARD_REGISTRATION_URL="https://$HUB_ROUTE/platform_hub/ai/registry/agent-cards/submit"

    export AUTH_API_KEY="$(kubectl get secret itom-secrets -n $CONCERT_HUB_NAMESPACE -o jsonpath='{ .data.AUTH_API_KEYS }' | base64 --decode)"
    export KC_DB_USERNAME="$(kubectl get secret app-cfg-oob-secret -n $CONCERT_HUB_NAMESPACE -o jsonpath='{ .data.KC_DB_USERNAME }' | base64 --decode)"
    export KC_DB_PASSWORD="$(kubectl get secret app-cfg-oob-secret -n $CONCERT_HUB_NAMESPACE -o jsonpath='{ .data.KC_DB_PASSWORD }' | base64 --decode)"

    echo "CONCERT_HUB_NAMESPACE: $CONCERT_HUB_NAMESPACE"
    echo "HUB_ROUTE: $HUB_ROUTE"
    echo "AGENT_CARD_REGISTRATION_URL: $AGENT_CARD_REGISTRATION_URL"    
    echo "AUTH_API_KEY: $AUTH_API_KEY" 
    echo "KC_DB_USERNAME: $KC_DB_USERNAME"
    echo "KC_DB_PASSWORD: $KC_DB_PASSWORD"


    kubectl exec -it $(kubectl get pods -n $CONCERT_HUB_NAMESPACE | grep ibm-solis-embedded-db | awk '{print $1}') -n $CONCERT_HUB_NAMESPACE -- \
    psql -U ${KC_DB_USERNAME} -d solisdb \
    -c "select name, endpoint_url from mcp_gateway.a2a_agents"


    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "    ✅ Register: DASHBOARD_AGENT"
    DASHBOARD_AGENT_URL="https://ibm-itom-ui-dashboard-agent-svc.$CONCERT_HUB_NAMESPACE.svc.cluster.local:51907"

    curl -k -X POST "$AGENT_CARD_REGISTRATION_URL" \
      -H "Secret: $AUTH_API_KEY" \
      -H "Content-Type: application/json" \
      -d @- <<EOF
    {
        "metadata": {
            "name": "ui-dashboard",
            "agentType": "generic",
            "author": "admin",
            "description": "A2A agent for generating ITOM dashboard definitions from natural language",
            "version": "1.0.0",
            "display_name": "UI Dashboard Agent",
            "organization": "itom",
            "category": "ui-generation"
        },
        "configuration": {
            "endpoint_url": "$DASHBOARD_AGENT_URL",
            "protocol": "a2a"
        },
        "security": {
            "access_level": "public",
            "requires_authentication": false,
            "authentication_type": "none"
        }
    }
    EOF

    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "    ✅ Register: SUMMARIZE_AGENT"
    SUMMARIZE_AGENT_URL="https://ibm-itom-summarize-agent-svc.$CONCERT_HUB_NAMESPACE.svc.cluster.local:51908"

    curl -k -X POST "$AGENT_CARD_REGISTRATION_URL" \
      -H "Secret: $AUTH_API_KEY" \
      -H "Content-Type: application/json" \
      -d @- <<EOF
    {
        "metadata": {
          "name": "ibm-itom-summarize-agent",
          "agentType": "generic",
          "author": "admin",
          "description": "Runs a list of GraphQL queries and narrates the combined results in the format the caller requests (text, Leadspace JSON, or markdown). Input is a concrete list of GraphQL operations - not free-form text, not another agents output. Never use it as a planner step except as part of the data-model-query skill. In other cases use it solely for the execution and summarization",
          "version": "1.0.0",
          "display_name": "SummarizeAgent",
          "organization": "itom",
          "category": "productivity"
        },
        "configuration": {
            "endpoint_url": "$SUMMARIZE_AGENT_URL",
            "protocol": "a2a"
        },
        "security": {
            "access_level": "public",
            "requires_authentication": false,
            "authentication_type": "none"
        }
    }
    EOF


    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "    ✅ Register: NL_TO_GQL_AGENT"
    NL_TO_GQL_AGENT_URL="https://ibm-itom-nl-to-gql-agent-svc.$CONCERT_HUB_NAMESPACE.svc.cluster.local:51906"

    curl -k -X POST "$AGENT_CARD_REGISTRATION_URL" \
      -H "Secret: $AUTH_API_KEY" \
      -H "Content-Type: application/json" \
      -d @- <<EOF
    {
        "metadata": {
            "name": "nl-to-gql-agent",
            "agentType": "generic",
            "author": "admin",
            "description": "Natural Language to GraphQL Agent",
            "version": "1.0.0",
            "display_name": "NL to GraphQL Agent",
            "organization": "itom",
            "category": "api-generation"
        },
        "configuration": {
            "endpoint_url": "$NL_TO_GQL_AGENT_URL",
            "protocol": "a2a"
        },
        "security": {
            "access_level": "public",
            "requires_authentication": false,
            "authentication_type": "none"
        }
    }
    EOF

    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "    ✅ Register: FALLBACK_AGENT"
    FALLBACK_AGENT_URL="https://ibm-itom-fallback-agent-svc.$CONCERT_HUB_NAMESPACE.svc.cluster.local:51910"

    curl -k -X POST "$AGENT_CARD_REGISTRATION_URL" \
      -H "Secret: $AUTH_API_KEY" \
      -H "Content-Type: application/json" \
      -d @- <<EOF
    {
        "metadata": {
            "name": "ibm-itom-fallback-agent",
            "agentType": "generic",
            "author": "admin",
            "description": "Fallback agent",
            "version": "1.0.0",
            "display_name": "ibm-itom-fallback-agent",
            "organization": "itom",
            "category": "general"
        },
        "configuration": {
            "endpoint_url": "$FALLBACK_AGENT_URL",
            "protocol": "a2a"
        },
        "security": {
            "access_level": "public",
            "requires_authentication": false,
            "authentication_type": "none"
        }
    }
    EOF

    # OBSERVABILITY_COORDINATOR_AGENT_URL="https://{OBSERVE_HOST}/a2a"

    # curl -k -X POST "$AGENT_CARD_REGISTRATION_URL" \
    #   -H "Secret: $AUTH_API_KEY" \
    #   -H "Content-Type: application/json" \
    #   -d @- <<EOF
    # {
    #     "metadata": {
    #       "name": "observability-coordinator",
    #       "agentType": "generic",
    #       "author": "admin",
    #       "description": "Observability coordinator",
    #       "version": "1.0.0",
    #       "display_name": "observability-coordinator",
    #       "organization": "itom",
    #       "category": "observability"
    #     },
    #     "configuration": {
    #         "endpoint_url": "$OBSERVABILITY_COORDINATOR_AGENT_URL",
    #         "protocol": "a2a"
    #     },
    #     "security": {
    #         "access_level": "public",
    #         "requires_authentication": false,
    #         "authentication_type": "none"
    #     }
    # }
    # EOF


    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "    ✅ Register: OPTIMIZATION_COORDINATOR_AGENT"
    export OPTIMIZE_HOST=$(oc get route -n turbonomic nginx -o jsonpath={.spec.host})
    OPTIMIZATION_COORDINATOR_AGENT_URL="https://$OPTIMIZE_HOST/turbonomic/turboai/a2a"

    curl -k -X POST "$AGENT_CARD_REGISTRATION_URL" \
      -H "Secret: $AUTH_API_KEY" \
      -H "Content-Type: application/json" \
      -d @- <<EOF
    {
        "metadata": {
          "name": "optimization-coordinator",
          "agentType": "generic",
          "author": "admin",
          "description": "Optimization coordinator",
          "version": "1.0.0",
          "display_name": "optimization-coordinator",
          "organization": "itom",
          "category": "optimization"
        },
        "configuration": {
            "endpoint_url": "$OPTIMIZATION_COORDINATOR_AGENT_URL",
            "protocol": "a2a"
        },
        "security": {
            "access_level": "public",
            "requires_authentication": false,
            "authentication_type": "none"
        }
    }
    EOF

    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "    ✅ Register: CONCERT_COORDINATOR_AGENT"
    export CONCERT_HOST=$(oc get route -n ibm-concert concert -o jsonpath={.spec.host})
    CONCERT_COORDINATOR_AGENT_URL="https://$CONCERT_HOST/concert/py-utils/a2a"


    curl -k -X POST "$AGENT_CARD_REGISTRATION_URL" \
      -H "Secret: $AUTH_API_KEY" \
      -H "Content-Type: application/json" \
      -d @- <<EOF
    { 
        "metadata": { 
          "name": "concert-coordinator", 
          "agentType": "generic", 
          "author": "admin", 
          "description": "Concert coordinator", 
          "version": "1.0.0", 
          "display_name": "concert-coordinator", 
          "organization": "itom", 
          "category": "protect" 
        }, 
        "configuration": { 
            "endpoint_url": "$CONCERT_COORDINATOR_AGENT_URL", 
            "protocol": "a2a" 
        }, 
        "security": { 
            "access_level": "public", 
            "requires_authentication": false, 
            "authentication_type": "none" 
        } 
    } 
    EOF


    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "    ✅ Register: CONCERT_CODE_AGENT_URL"
    curl -k -X POST "$AGENT_CARD_REGISTRATION_URL" \
      -H "Secret: $AUTH_API_KEY" \
      -H "Content-Type: application/json" \
      -d @- <<EOF
    { 
          "metadata": { 
            "name": "ibm-itom-concert-code-agent", 
            "agentType": "generic", 
            "author": "", 
            "description": "", 
            "version": "1.0", 
            "display_name": "ibm-itom-concert-code-agent", 
            "organization": "itom", 
            "category": "productivity" 
        }, 
        "configuration": { 
          "endpoint_url": "https://ibm-itom-concert-code-agent-svc:51909", 
          "protocol": "a2a" 
        }, 
        "security": { 
          "access_level": "restricted", 
          "requires_authentication": true, 
          "authentication_type": "api_key" 
        } 
    }
    EOF

    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo "    ✅ Registered Agents"

    kubectl exec -it $(kubectl get pods -n $CONCERT_HUB_NAMESPACE | grep ibm-solis-embedded-db | awk '{print $1}') -n $CONCERT_HUB_NAMESPACE -- \
    psql -U ${KC_DB_USERNAME} -d solisdb \
    -c "select name, endpoint_url from mcp_gateway.a2a_agents"

  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash
  when: (current_feature.registerAgents | default(true))|bool == true  

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1









- name:   🚀 IBM Concert - IBM Concert Register WatsonX
  shell: |
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " ✅ Register WatsonX"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    

    # echo "------------------------------------------------------------------------------------------------------------------------------"
    # echo " 🚀 Enable WatsonX"
    export CONCERT_NAMESPACE=ibm-concert
    export CONCERT_HUB_NAMESPACE=$CONCERT_NAMESPACE-hub
    export WATSONX_API_KEY={{current_feature.watsonx_token}}
    export WATSONX_API_PROJECT_ID={{current_feature.watsonx_projectid}}
    export WATSONX_API_URL={{current_feature.watsonx_url}}

    echo "CONCERT_NAMESPACE: $CONCERT_NAMESPACE"
    echo "CONCERT_HUB_NAMESPACE: $CONCERT_HUB_NAMESPACE"
    echo "WATSONX_API_KEY: $WATSONX_API_KEY"
    echo "WATSONX_API_PROJECT_ID: $WATSONX_API_PROJECT_ID"
    echo "WATSONX_API_URL: $WATSONX_API_URL"


    kubectl patch secret/app-cfg-secret -n $CONCERT_NAMESPACE --type=merge -p '{
      "data": {
        "WATSONX_API_KEY": "'$(echo -n $WATSONX_API_KEY | base64 )'",
        "WATSONX_API_PROJECT_ID": "'$(echo -n "$WATSONX_API_PROJECT_ID" | base64 )'",
        "WATSONX_API_URL": "'$(echo -n "$WATSONX_API_URL" | base64 )'"
      }
    }'
    kubectl rollout restart -n $CONCERT_NAMESPACE deployment/roja-py-utils


    api_val=$(echo -n "$WATSONX_API_KEY" | base64 -w0)
    proj_val=$(echo -n "$WATSONX_PROJECT_ID" | base64 -w0)
    url_val=$(echo -n "$WATSONX_API_URL" | base64 -w0)
    user_val=$(echo -n "$WATSONX_USERNAME" | base64 -w0)

    kubectl get -n $CONCERT_HUB_NAMESPACE secret/itom-secrets -o json \
    | jq ".data += {\"WATSONX_API_KEY\": \"$api_val\"}" \
    | jq ".data += {\"WATSONX_PROJECT_ID\": \"$proj_val\"}" \
    | jq ".data += {\"WATSONX_URL\": \"$url_val\"}" \
    | kubectl apply -n $CONCERT_HUB_NAMESPACE -f -

    kubectl rollout restart -n $CONCERT_HUB_NAMESPACE deployment/ibm-itom-ui-dashboard-agent

    kubectl rollout restart -n $CONCERT_HUB_NAMESPACE deployment/ibm-itom-nl-to-gql-agent

    kubectl rollout restart -n $CONCERT_HUB_NAMESPACE deployment/ibm-itom-summarize-agent

  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash
  when: (current_feature.enable_WatsonX | default(false))|bool == true  

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1



- name:   🚀 IBM Concert - IBM Concert Integrate with KeyCloak
  shell: |
    echo "------------------------------------------------------------------------------------------------------------------------------"
    echo " ✅ Integrate with KeyCloak"
    echo "------------------------------------------------------------------------------------------------------------------------------"
    
    export CONCERT_NAMESPACE={{ current_ibm_feature.project }}
    export CONCERT_HUB_NAMESPACE={{ current_ibm_feature.project }}-hub

    export CONCERT_USER={{current_feature.concert_user | default("admin") }}
    export CONCERT_PASSWORD={{ global_config.global_password }}
    export KC_ROUTE=$(oc get route solis-hub -o jsonpath={.spec.host} -n $CONCERT_HUB_NAMESPACE)
    export OCP_ROUTE=$(oc get route concert -o jsonpath={.spec.host} -n $CONCERT_NAMESPACE)

    echo "CONCERT_NAMESPACE:            $CONCERT_NAMESPACE"
    echo "CONCERT_HUB_NAMESPACE:        $CONCERT_HUB_NAMESPACE"
    echo "OCP_ROUTE:                    https://$OCP_ROUTE"
    echo "KC_ROUTE:                     https://$KC_ROUTE/sys/internal/kc"

    echo "CONCERT_USER:                 $CONCERT_USER"
    echo "CONCERT_PASSWORD:             $CONCERT_PASSWORD"


    /tmp/ibm-concert/concert-hub/bin//setup-keycloak.sh \
      --kc-url=https://$KC_ROUTE/sys/internal/kc \
      --namespace=$CONCERT_HUB_NAMESPACE \
      --product-url=https://$OCP_ROUTE \
      --username=$CONCERT_USER \
      --password=$CONCERT_PASSWORD


    oc delete ConsoleNotification ibm-aiops-notification-kc>/dev/null 2>/dev/null
    export KC_USER=$(kubectl exec -it $(kubectl get pods -n ibm-concert-hub | grep "ibm-solis-embedded-keycloak" | awk '{print $1}') -n ibm-concert-hub -- env | grep 'KC_BOOTSTRAP_ADMIN_USERNAME='| cut -d= -f2)
    export KC_PWD=$(kubectl exec -it $(kubectl get pods -n ibm-concert-hub | grep "ibm-solis-embedded-keycloak" | awk '{print $1}') -n ibm-concert-hub -- env | grep 'KC_BOOTSTRAP_ADMIN_PASSWORD='| cut -d= -f2)
    export KC_ROUTE=$(oc get route solis-hub -o jsonpath={.spec.host} -n $CONCERT_HUB_NAMESPACE)


    echo "KC_USER:        $KC_USER"
    echo "KC_PWD:         $KC_PWD"
    echo "KC_ROUTE:       https://$KC_ROUTE/sys/internal/kc"

    export appURL=$(oc get routes -n ibm-concert concert  -o jsonpath="{['spec']['host']}")|| true
    cat <<EOF | oc apply -f -
    apiVersion: console.openshift.io/v1
    kind: ConsoleNotification
    metadata:
        name: ibm-aiops-notification-kc
    spec:
        backgroundColor: '#003148'
        color: '#fff'
        link:
            href: "https://$KC_ROUTE/sys/internal/kc"
            text: IBM KeyCloak
        location: BannerTop
        text: "✅ IBM Concert KeyCloak. User: $KC_USER - Password: $KC_PWD  🚀 Access it here:"
    EOF

    cat <<EOF | oc apply -f -
        apiVersion: console.openshift.io/v1
        kind: ConsoleLink
        metadata:
            name: ibm-concert-kc
        spec:
            applicationMenu:
                imageURL: 'https://raw.githubusercontent.com/niklaushirt/ibm-aiops-deployer/main/doc/pics/icons/launch.svg'
                section: Admin Tools
            href: https://$KC_ROUTE/sys/internal/kc
            location: ApplicationMenu
            text: IBM Concert KeyCloak
    EOF


  register: output_string
  ignore_errors: true
  args:
    executable: /bin/bash
  when: (current_feature.integrate_keycloak | default(false))|bool == true  

- name: 🟣  OUTPUT
  debug: 
    var: output_string.stdout_lines
    #verbosity: 1





